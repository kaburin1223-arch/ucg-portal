<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>μ·ΓνΝΟξΕΏο’▓</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>μ·ΓνΝΟξΕΏο’▓</h1>

<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px;">
  <a href="../index.html" style="padding:6px 10px;border:1px solid #ccc;text-decoration:none;">θΆΊ PORTAL</a>
</div>

<select id="deckSelect"></select>
<button onclick="saveRecord()">ξΕΏο’▓</button>

<ul id="recordList"></ul>

<script>
const DECK_KEY = "ucg_decks";
const RECORD_KEY = "ucg_records";

function loadDecks(){
  const decks = JSON.parse(localStorage.getItem(DECK_KEY) || "[]");
  const select = document.getElementById("deckSelect");
  select.innerHTML = "";

  decks.forEach(d=>{
    const opt = document.createElement("option");
    opt.value = d.deck_id;
    opt.textContent = d.deck_name;
    select.appendChild(opt);
  });
}

function loadRecords(){
  const records = JSON.parse(localStorage.getItem(RECORD_KEY) || "[]");
  const list = document.getElementById("recordList");
  list.innerHTML = "";

  records.forEach(r=>{
    const li = document.createElement("li");
    li.textContent = r.myDeck + " (" + r.myDeckId + ")";
    list.appendChild(li);
  });
}

function saveRecord(){
  const select = document.getElementById("deckSelect");
  const deckId = select.value;
  const deckName = select.options[select.selectedIndex].text;

  const records = JSON.parse(localStorage.getItem(RECORD_KEY) || "[]");

  records.push({
    id: "rec_" + Date.now(),
    myDeckId: deckId,
    myDeck: deckName
  });

  localStorage.setItem(RECORD_KEY, JSON.stringify(records));
  loadRecords();
}

loadDecks();
loadRecords();
</script>

</body>
</html>
